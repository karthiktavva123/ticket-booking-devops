name: Deploy App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Stop old container
        run: |
          docker stop ticket-container || true
          docker rm ticket-container || true

      - name: Build Docker image
        run: docker build -t ticket-app .

      - name: Run container
        run: docker run -d -p 5000:5000 --name ticket-container ticket-app
